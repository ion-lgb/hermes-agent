name: Build Windows offline installer

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional tag to publish after a successful build
        required: false
        type: string
      release_title:
        description: Required with release_tag when publishing a Release
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: windows-offline-installer
  cancel-in-progress: false

jobs:
  build:
    name: Windows x64 offline NSIS
    runs-on: windows-latest
    timeout-minutes: 240

    steps:
      - name: Validate release inputs
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_TITLE: ${{ inputs.release_title }}
        run: |
          $hasTag = -not [string]::IsNullOrWhiteSpace($env:RELEASE_TAG)
          $hasTitle = -not [string]::IsNullOrWhiteSpace($env:RELEASE_TITLE)
          if ($hasTag -ne $hasTitle) {
            throw "release_tag and release_title must either both be supplied or both be empty"
          }

      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Set up Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm

      - name: Install desktop build dependencies
        shell: pwsh
        run: npm ci --no-audit --no-fund

      - name: Validate offline PowerShell scripts
        shell: pwsh
        run: |
          $failed = $false
          foreach ($path in @(
            "scripts/offline/prepare-windows-payload.ps1",
            "scripts/offline/install-offline.ps1"
          )) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $path),
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $failed = $true
              $errors | ForEach-Object { Write-Error "$path : $_" }
            }
          }
          if ($failed) { throw "Offline PowerShell validation failed" }

      - name: Prepare offline framework payload
        shell: pwsh
        run: |
          ./scripts/offline/prepare-windows-payload.ps1 `
            -PayloadRoot "apps/desktop/build/offline-payload" `
            -Commit "${{ github.sha }}" `
            -PythonVersion "3.11" `
            -NodeVersion "22" `
            -GitVersion "2.54.0"

      - name: Smoke-test offline provisioning
        shell: pwsh
        run: |
          $smokeRoot = Join-Path $env:RUNNER_TEMP "hermes-offline-smoke"
          $browserRoot = Join-Path $env:RUNNER_TEMP "hermes-offline-smoke-browser"
          ./scripts/offline/install-offline.ps1 `
            -PayloadRoot "apps/desktop/build/offline-payload" `
            -HermesHome $smokeRoot `
            -BrowserRoot $browserRoot `
            -LogPath (Join-Path $env:RUNNER_TEMP "hermes-offline-smoke.log")
          $python = Join-Path $smokeRoot "hermes-agent/venv/Scripts/python.exe"
          $env:PYTHONPATH = Join-Path $smokeRoot "hermes-agent"
          & $python -c "import hermes_cli; print(hermes_cli.__file__)"
          if ($LASTEXITCODE -ne 0) { throw "Offline Hermes import smoke test failed" }

      - name: Build offline NSIS installer
        shell: pwsh
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          WIN_CSC_LINK: ""
          WIN_CSC_KEY_PASSWORD: ""
        working-directory: apps/desktop
        run: |
          npm run build
          npm run builder -- --win nsis --x64 --config electron-builder.offline.cjs

      - name: Smoke-test final NSIS installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem "apps/desktop/release/Hermes-Offline-*-windows-x64.exe" -File
          if ($installer.Count -ne 1) {
            throw "Expected exactly one offline installer, found $($installer.Count)"
          }

          $installedHermesHome = Join-Path $env:LOCALAPPDATA "hermes"
          $installDirectory = Join-Path $env:RUNNER_TEMP "HermesOfflineApp"
          foreach ($path in @($installedHermesHome, $installDirectory)) {
            if (Test-Path -LiteralPath $path) {
              Remove-Item -LiteralPath $path -Recurse -Force
            }
          }

          $process = Start-Process `
            -FilePath $installer.FullName `
            -ArgumentList @("/S", "/D=$installDirectory") `
            -PassThru
          if (-not $process.WaitForExit(900000)) {
            $process.Kill()
            throw "Final NSIS installer did not exit within 15 minutes"
          }
          if ($process.ExitCode -ne 0) {
            $logPath = Join-Path $installedHermesHome "logs/offline-install.log"
            if (Test-Path -LiteralPath $logPath) {
              Get-Content -LiteralPath $logPath -Raw | Write-Host
            }
            throw "Final NSIS installer failed with exit code $($process.ExitCode)"
          }

          $installedPython = Join-Path $installedHermesHome "hermes-agent/venv/Scripts/python.exe"
          if (-not (Test-Path -LiteralPath $installedPython -PathType Leaf)) {
            throw "Final NSIS installer did not create the Hermes venv: $installedPython"
          }
          $env:PYTHONPATH = Join-Path $installedHermesHome "hermes-agent"
          & $installedPython -c "import hermes_cli; print(hermes_cli.__file__)"
          if ($LASTEXITCODE -ne 0) {
            throw "Final NSIS Hermes import smoke test failed"
          }

      - name: Create SHA-256 checksum
        shell: pwsh
        run: |
          $installer = Get-ChildItem "apps/desktop/release/Hermes-Offline-*-windows-x64.exe" -File
          if ($installer.Count -ne 1) {
            throw "Expected exactly one offline installer, found $($installer.Count)"
          }
          $hash = Get-FileHash -LiteralPath $installer.FullName -Algorithm SHA256
          "$($hash.Hash.ToLowerInvariant())  $($installer.Name)" |
            Set-Content -LiteralPath "$($installer.FullName).sha256" -Encoding ascii

      - name: Upload offline installer
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: hermes-windows-x64-offline
          path: |
            apps/desktop/release/Hermes-Offline-*-windows-x64.exe
            apps/desktop/release/Hermes-Offline-*-windows-x64.exe.sha256
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub Release
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.release_tag != '' &&
      inputs.release_title != ''
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download offline installer
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: hermes-windows-x64-offline
          path: release

      - name: Publish unsigned Windows x64 release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_TITLE: ${{ inputs.release_title }}
          RELEASE_NOTES: |
            Self-contained Hermes Desktop and framework installer for Windows x64.

            This installer is unsigned and may trigger a Windows SmartScreen warning.
            It includes Python, Node.js, PortableGit, agent-browser, and Chrome for Testing.
            It does not include a model, model server, or model weights. Configure a local
            or network model provider separately after installation.
        run: |
          gh release create "$RELEASE_TAG" \
            release/Hermes-Offline-*-windows-x64.exe \
            release/Hermes-Offline-*-windows-x64.exe.sha256 \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TITLE" \
            --notes "$RELEASE_NOTES"
